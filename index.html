<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipCraft — Video + Music</title>
<style>
  :root{--bg:#0c0c0f;--surface:#16161e;--surface2:#1e1e2a;--border:#2a2a3a;
    --accent:#7c3aed;--accent2:#a855f7;--green:#22c55e;--text:#f0f0f5;--sub:#6b7280;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 3rem;gap:1.5rem;}
  .logo{font-size:1.8rem;font-weight:800;letter-spacing:-1px;
    background:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{color:var(--sub);font-size:.82rem;margin-top:4px;text-align:center;}
  .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:620px;}
  .drop-zone{border:2px dashed var(--border);border-radius:18px;padding:1.75rem 1rem;text-align:center;
    cursor:pointer;transition:all .25s;background:var(--surface);user-select:none;}
  .drop-zone:hover{border-color:var(--accent);background:rgba(124,58,237,.08);}
  .drop-zone.dragging{border-color:var(--accent2);transform:scale(1.02);}
  .drop-zone.loaded{border-color:var(--green);border-style:solid;background:rgba(34,197,94,.06);}
  .dz-icon{font-size:2.2rem;margin-bottom:8px;display:block;}
  .drop-zone h3{font-size:.95rem;font-weight:600;}
  .drop-zone p{font-size:.75rem;color:var(--sub);margin-top:4px;line-height:1.5;}
  .dz-file{font-size:.72rem;color:var(--green);margin-top:6px;word-break:break-all;font-weight:500;}
  input[type=file]{display:none;}
  .mix-panel{width:100%;max-width:620px;background:var(--surface);border:1px solid var(--border);
    border-radius:16px;padding:1.2rem 1.4rem;display:none;gap:.9rem;flex-direction:column;}
  .mix-panel h3{font-size:.85rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
  .vol-row{display:flex;align-items:center;gap:.75rem;}
  .vol-label{font-size:.82rem;min-width:130px;display:flex;align-items:center;gap:6px;}
  input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:99px;
    background:var(--surface2);outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
    border-radius:50%;background:var(--accent2);cursor:pointer;}
  .vol-pct{font-size:.8rem;color:var(--sub);min-width:36px;text-align:right;}
  .btn{padding:.7rem 1.8rem;border-radius:12px;border:none;cursor:pointer;font-size:.95rem;
    font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
  .btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;width:100%;max-width:620px;justify-content:center;}
  .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,58,237,.35);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-sm{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:.5rem 1.2rem;font-size:.85rem;}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent2);}
  .progress-wrap{width:100%;max-width:620px;display:none;}
  .pbar-bg{background:var(--surface);border-radius:99px;height:10px;overflow:hidden;margin-bottom:8px;}
  .pbar{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7,#ec4899);border-radius:99px;transition:width .25s ease;width:0%;}
  .pbar-status{display:flex;justify-content:space-between;font-size:.78rem;color:var(--sub);}
  .result-wrap{width:100%;max-width:620px;display:none;}
  .result-wrap video{width:100%;border-radius:16px;background:#000;display:block;}
  .result-actions{display:flex;gap:10px;margin-top:12px;justify-content:center;flex-wrap:wrap;}
  .error-box{width:100%;max-width:620px;display:none;background:rgba(239,68,68,.08);
    border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px 16px;
    color:#fca5a5;font-size:.82rem;line-height:1.6;}
  .hint{font-size:.72rem;color:var(--sub);text-align:center;}
</style>
</head>
<body>

<div style="text-align:center">
  <div class="logo">🎬 ClipCraft</div>
  <p class="sub">Drop in a video and music file — outputs a real MP4</p>
</div>

<div class="upload-grid">
  <div class="drop-zone" id="videoZone">
    <span class="dz-icon">🎬</span>
    <h3>Video</h3>
    <p>MP4 · MOV · WebM</p>
    <div class="dz-file" id="videoName"></div>
  </div>
  <div class="drop-zone" id="musicZone">
    <span class="dz-icon">🎵</span>
    <h3>Music</h3>
    <p>MP3 · AAC · WAV</p>
    <div class="dz-file" id="musicName"></div>
  </div>
</div>

<input type="file" id="videoInput" accept="video/*">
<input type="file" id="musicInput" accept="audio/*">

<div class="mix-panel" id="mixPanel">
  <h3>🎚️ Audio Mix</h3>
  <div class="vol-row">
    <div class="vol-label"><span>🎙️</span> Original audio</div>
    <input type="range" id="volVideo" min="0" max="200" value="100">
    <div class="vol-pct" id="volVideoLabel">100%</div>
  </div>
  <div class="vol-row">
    <div class="vol-label"><span>🎵</span> Music</div>
    <input type="range" id="volMusic" min="0" max="200" value="30">
    <div class="vol-pct" id="volMusicLabel">30%</div>
  </div>
</div>

<button class="btn btn-primary" id="goBtn" disabled>🎬 &nbsp;Combine</button>
<div class="error-box" id="errBox"></div>

<div class="progress-wrap" id="progressWrap">
  <div class="pbar-bg"><div class="pbar" id="pbar"></div></div>
  <div class="pbar-status"><span id="pbarMsg">Starting…</span><span id="pbarPct"></span></div>
</div>

<div class="result-wrap" id="resultWrap">
  <video id="resultVid" controls playsinline></video>
  <div class="result-actions">
    <a class="btn btn-primary" id="dlBtn" download="combined.mp4">⬇️ &nbsp;Download .mp4</a>
    <button class="btn btn-sm" onclick="resetAll()">🔄 Start Over</button>
  </div>
</div>

<p class="hint">No upload · no server · files never leave your browser · powered by FFmpeg.wasm</p>

<script type="module">
import { FFmpeg }               from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
import { fetchFile, toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';

let vidFile = null, musFile = null, vidUrl = null;
let ffmpeg  = null, loadPromise = null;

// ── FFmpeg loader ─────────────────────────────────────────────────
// Single shared promise — safe to call before user clicks.
// toBlobURL rewraps each CDN script as a same-origin blob://
// so the Worker origin check passes on any HTTPS host.
function loadFFmpeg() {
  if (loadPromise) return loadPromise;
  loadPromise = (async () => {
    ffmpeg = new FFmpeg();
    ffmpeg.on('progress', ({ progress }) =>
      setStatus('Muxing… ' + Math.round(progress * 100) + '%', 60 + progress * 38));

    const core    = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';
    const ffpkg   = 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm';

    await ffmpeg.load({
      coreURL:   await toBlobURL(core  + '/ffmpeg-core.js',   'text/javascript'),
      wasmURL:   await toBlobURL(core  + '/ffmpeg-core.wasm', 'application/wasm'),
      workerURL: await toBlobURL(ffpkg + '/worker.js',        'text/javascript'),
    });
    return ffmpeg;
  })();
  loadPromise.catch(() => { loadPromise = null; }); // allow retry on failure
  return loadPromise;
}

// Kick off load immediately so it's ready when user clicks
loadFFmpeg().catch(() => {});

// ── Drop zones ────────────────────────────────────────────────────
function setupZone(zoneId, inputId, handler) {
  const zone = document.getElementById(zoneId);
  const inp  = document.getElementById(inputId);
  zone.addEventListener('click', () => inp.click());
  inp.addEventListener('change', () => handler(inp.files[0]));
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragging'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragging'); handler(e.dataTransfer.files[0]); });
}
setupZone('videoZone', 'videoInput', f => {
  if (!f) return; vidFile = f;
  if (vidUrl) URL.revokeObjectURL(vidUrl);
  vidUrl = URL.createObjectURL(f);
  document.getElementById('videoName').textContent = f.name + ' · ' + (f.size/1024/1024).toFixed(1) + ' MB';
  document.getElementById('videoZone').classList.add('loaded');
  checkReady();
});
setupZone('musicZone', 'musicInput', f => {
  if (!f) return; musFile = f;
  document.getElementById('musicName').textContent = f.name + ' · ' + (f.size/1024/1024).toFixed(1) + ' MB';
  document.getElementById('musicZone').classList.add('loaded');
  checkReady();
});
function checkReady() {
  const ok = vidFile && musFile;
  document.getElementById('goBtn').disabled = !ok;
  document.getElementById('mixPanel').style.display = ok ? 'flex' : 'none';
}
['volVideo','volMusic'].forEach(id => {
  const el = document.getElementById(id), lbl = document.getElementById(id + 'Label');
  el.addEventListener('input', () => lbl.textContent = el.value + '%');
});

// ── Combine ───────────────────────────────────────────────────────
document.getElementById('goBtn').addEventListener('click', async () => {
  document.getElementById('errBox').style.display     = 'none';
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('goBtn').disabled = true;

  try {
    const url = await combine();
    const vid = document.getElementById('resultVid');
    vid.src = url; vid.load();
    await new Promise(res => { vid.oncanplay = res; vid.onerror = res; });
    document.getElementById('dlBtn').href = url;
    document.getElementById('resultWrap').style.display = 'block';
    setStatus('Done!', 100);
  } catch(e) {
    console.error(e);
    const b = document.getElementById('errBox');
    b.style.display = 'block';
    b.textContent = '⚠️ ' + ((e && e.message) ? e.message : String(e));
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('goBtn').disabled = false;
  }
});

// ── Main combine ──────────────────────────────────────────────────
async function combine() {
  const videoVol = document.getElementById('volVideo').value / 100;
  const musicVol = document.getElementById('volMusic').value / 100;

  setStatus('Loading FFmpeg…', 2);
  const ff = await loadFFmpeg();

  setStatus('Reading files…', 12);
  const vidExt = (vidFile.name.match(/\.(\w+)$/) || ['','mp4'])[1].toLowerCase();
  const musExt = (musFile.name.match(/\.(\w+)$/) || ['','mp3'])[1].toLowerCase();

  await ff.writeFile('input.' + vidExt, await fetchFile(vidFile));
  await ff.writeFile('music.' + musExt, await fetchFile(musFile));

  setStatus('Muxing…', 20);

  // -c:v copy      → remux video stream, no re-encode (fast + lossless)
  // -c:a aac       → encode mixed audio to AAC (required for MP4)
  // -stream_loop   → loop music to match video length
  // -movflags +faststart → put MP4 index at front so browser can play immediately
  const filterComplex =
    '[0:a]volume=' + videoVol + '[va];' +
    '[1:a]volume=' + musicVol + '[ma];' +
    '[va][ma]amix=inputs=2:duration=first:dropout_transition=0[aout]';

  let ok = false;

  // Attempt 1: mix original audio + music
  try {
    await ff.exec([
      '-i', 'input.' + vidExt,
      '-stream_loop', '-1', '-i', 'music.' + musExt,
      '-filter_complex', filterComplex,
      '-map', '0:v', '-map', '[aout]',
      '-c:v', 'copy', '-c:a', 'aac', '-b:a', '192k',
      '-shortest', '-movflags', '+faststart',
      'output.mp4'
    ]);
    ok = true;
  } catch(_) {}

  // Attempt 2: no original audio (video had no audio track)
  if (!ok) {
    try { await ff.deleteFile('output.mp4'); } catch(_) {}
    await ff.exec([
      '-i', 'input.' + vidExt,
      '-stream_loop', '-1', '-i', 'music.' + musExt,
      '-map', '0:v', '-map', '1:a',
      '-c:v', 'copy', '-c:a', 'aac', '-b:a', '192k',
      '-shortest', '-movflags', '+faststart',
      'output.mp4'
    ]);
  }

  setStatus('Packaging…', 98);
  const data = await ff.readFile('output.mp4');

  // Clean up virtual FS
  for (const f of ['input.' + vidExt, 'music.' + musExt, 'output.mp4']) {
    try { await ff.deleteFile(f); } catch(_) {}
  }

  const blob = new Blob([data.buffer], { type: 'video/mp4' });
  return URL.createObjectURL(new File([blob], 'combined.mp4', { type: 'video/mp4' }));
}

function setStatus(msg, pct) {
  document.getElementById('pbar').style.width    = Math.min(100, Math.round(pct)) + '%';
  document.getElementById('pbarMsg').textContent = msg;
  document.getElementById('pbarPct').textContent = Math.min(100, Math.round(pct)) + '%';
}

window.resetAll = function() {
  vidFile = null; musFile = null;
  if (vidUrl) URL.revokeObjectURL(vidUrl); vidUrl = null;
  ['videoZone','musicZone'].forEach(id => document.getElementById(id).classList.remove('loaded'));
  ['videoName','musicName'].forEach(id => document.getElementById(id).textContent = '');
  ['videoInput','musicInput'].forEach(id => document.getElementById(id).value = '');
  ['progressWrap','resultWrap','errBox','mixPanel'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('pbar').style.width = '0%';
  document.getElementById('goBtn').disabled = true;
};
</script>
</body>
</html>
